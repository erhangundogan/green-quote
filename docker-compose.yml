services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: greenquote
      POSTGRES_USER: greenquote
      POSTGRES_PASSWORD: greenquote
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenquote"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Defaults to the local postgres service — override with a Neon URL for production.
      DATABASE_URL: ${DATABASE_URL:-postgresql://greenquote:greenquote@db:5432/greenquote}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      LOG_LEVEL: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
