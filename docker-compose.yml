services:
  web:
    platform: linux/arm64
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/data/greenquote.db}
      #JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_SECRET: w9gNJHyFdnMWySWQ6j/OoKzMVhs2QYj78jz0fGj86qw=
      NODE_ENV: production
      LOG_LEVEL: info
    volumes:
      - sqlite_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  sqlite_data:
